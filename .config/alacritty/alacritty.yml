import:
  - ~/.config/alacritty/themes/themes/carbonfox.yml

window:
  dimensions:
    columns: 150
    lines: 50
  padding:
    x: 10
    y: 10
  class:
    instance: Alacritty
    general: Alacritty
  opacity: 1
  decorations: none
  #startup_mode: Fullscreen

scrolling:
  history: 10000
  multiplier: 3

font:
  normal:
    family: JetBrainsMono Nerd Font
    style: Regular
  bold:
    family: JetBrainsMono Nerd Font
    style: Bold
  italic:
    family: JetBrainsMono Nerd Font
    style: Italic
  bold_italic:
    family: JetBrainsMono Nerd Font
    style: Bold Italic
  size: 14

  offset:
    x: 0
    y: 0

tabspaces: 4

draw_bold_text_with_bright_colors: true

selection:
  save_to_clipboard: false

key_bindings:
  - { key: Return, mods: Super|Shift, action: SpawnNewInstance }
